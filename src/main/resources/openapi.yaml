openapi: "3.0.3"
info:
  title: Plataforma de gerencimaneto servicos
  version: "1.0.0"
  description: Endpoints de seviço

servers:
  - url: http://localhost:8080
    description: Ambiente local
paths:
  /auth/login:
    post:
      tags:
        - autenticação
      summary: Login do usuário
      operationId: loginUser
      description: Autentica com email e senha e retorna um JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      tags:
        - autenticação
      summary: Login do usuário
      operationId: registerUser
      description: Cria uma conta com nome, email e senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email já cadastrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: usuario@email.com
        password:
          type: string
          minLength: 8
          example: "Senha@123"

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: João Silva
        email:
          type: string
          format: email
          example: usuario@email.com
        password:
          type: string
          minLength: 8
          example: "Senha@123"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 86400

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 401
        message:
          type: string
          example: Credenciais inválidas
        timestamp:
          type: string
          format: date-time
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

