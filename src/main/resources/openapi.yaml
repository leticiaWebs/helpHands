openapi: 3.0.3
info:
  title: Servicios API
  description: |
    API REST para aplicativo MVP de serviços sob demanda. 
    ## Ambientes
    - **Desenvolvimento**: http://localhost:8080/
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
    description: Servidor de Desenvolvimento
tags:
  - name: Autenticação
    description: Endpoints de autenticação e autorização
  - name: Usuários
    description: Gerenciamento de perfil de usuários
  - name: Serviços
    description: CRUD de serviços oferecidos
  - name: Agendamentos
    description: Agendamento de serviços
  - name: Pagamentos
    description: Processamento de pagamentos
  - name: Avaliações
    description: Sistema de reviews e ratings
  - name: Chat
    description: Mensagens em tempo real
  - name: Favoritos
    description: Gerenciamento de serviços favoritos
  - name: Notificações
    description: Gerenciamento de notificações

paths:
  /users/{id}:
    get:
      tags:
        - Usuários
      summary: Obter perfil do usuário
      description: Retorna informações do perfil do usuário
      operationId: getUserProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Perfil obtido com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Não autorizado
        '404':
          description: Usuário não encontrado

    put:
      tags:
        - Usuários
      summary: Atualizar perfil
      description: Atualiza informações do perfil do usuário
      operationId: updateUserProfile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Perfil atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Dados inválidos
        '401':
          description: Não autorizado
        '404':
          description: Usuário não encontrado

  /users/{id}/avatar:
    put:
      tags:
        - Usuários
      summary: Atualizar foto de perfil
      description: Faz upload de nova foto de perfil
      operationId: updateUserAvatar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar atualizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  profilePicture:
                    type: string
        '400':
          description: Arquivo inválido
        '401':
          description: Não autorizado

  /users/{id}/ratings:
    get:
      tags:
        - Usuários
      summary: Obter avaliações do usuário
      description: Lista todas as avaliações recebidas pelo usuário
      operationId: getUserRatings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Avaliações obtidas com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
        '404':
          description: Usuário não encontrado
  /services:
    get:
      tags:
        - Serviços
      summary: Listar serviços
      description: Lista serviços com filtros opcionais
      operationId: listServices
      parameters:
        - name: category
          in: query
          description: Filtrar por categoria
          schema:
            type: string
          example: Limpeza
        - name: city
          in: query
          description: Filtrar por cidade
          schema:
            type: string
        - name: minRating
          in: query
          description: Avaliação mínima
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 5
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Serviços listados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
        '400':
          description: Parâmetros inválidos

    post:
      tags:
        - Serviços
      summary: Criar novo serviço
      description: Cria um novo serviço (apenas para prestadores)
      operationId: createService
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceRequest'
      responses:
        '201':
          description: Serviço criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Dados inválidos
        '401':
          description: Não autorizado
        '403':
          description: Apenas prestadores podem criar serviços

  /services/{id}:
    get:
      tags:
        - Serviços
      summary: Obter detalhes do serviço
      description: Retorna informações detalhadas de um serviço
      operationId: getService
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Serviço obtido com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceDetailResponse'
        '404':
          description: Serviço não encontrado

    put:
      tags:
        - Serviços
      summary: Atualizar serviço
      description: Atualiza informações do serviço
      operationId: updateService
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateServiceRequest'
      responses:
        '200':
          description: Serviço atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '401':
          description: Não autorizado
        '403':
          description: Você não é o prestador deste serviço
        '404':
          description: Serviço não encontrado

    delete:
      tags:
        - Serviços
      summary: Deletar serviço
      description: Deleta um serviço (soft delete)
      operationId: deleteService
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Serviço deletado com sucesso
        '401':
          description: Não autorizado
        '403':
          description: Você não é o prestador deste serviço
        '404':
          description: Serviço não encontrado

  /services/{id}/availability:
    get:
      tags:
        - Serviços
      summary: Obter disponibilidades
      description: Retorna os horários disponíveis do serviço
      operationId: getServiceAvailability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Disponibilidades obtidas com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AvailabilityResponse'
        '404':
          description: Serviço não encontrado

    post:
      tags:
        - Serviços
      summary: Adicionar disponibilidade
      description: Adiciona um novo horário de disponibilidade
      operationId: addAvailability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAvailabilityRequest'
      responses:
        '201':
          description: Disponibilidade adicionada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          description: Dados inválidos
        '401':
          description: Não autorizado
        '404':
          description: Serviço não encontrado
  /bookings:
    get:
      tags:
        - Agendamentos
      summary: Listar meus agendamentos
      description: Lista agendamentos do usuário autenticado
      operationId: listMyBookings
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Agendamentos listados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
        '401':
          description: Não autorizado

    post:
      tags:
        - Agendamentos
      summary: Criar agendamento
      description: Cria um novo agendamento de serviço
      operationId: createBooking
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Agendamento criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          description: Dados inválidos ou conflito de horário
        '401':
          description: Não autorizado
        '404':
          description: Serviço não encontrado

  /bookings/{id}:
    get:
      tags:
        - Agendamentos
      summary: Obter detalhes do agendamento
      operationId: getBooking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Agendamento obtido com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetailResponse'
        '401':
          description: Não autorizado
        '403':
          description: Você não tem acesso a este agendamento
        '404':
          description: Agendamento não encontrado

    put:
      tags:
        - Agendamentos
      summary: Atualizar agendamento
      operationId: updateBooking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookingRequest'
      responses:
        '200':
          description: Agendamento atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          description: Dados inválidos
        '401':
          description: Não autorizado
        '404':
          description: Agendamento não encontrado

  /bookings/{id}/confirm:
    put:
      tags:
        - Agendamentos
      summary: Confirmar agendamento
      description: Confirma um agendamento pendente (apenas prestador)
      operationId: confirmBooking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Agendamento confirmado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '401':
          description: Não autorizado
        '403':
          description: Apenas o prestador pode confirmar
        '404':
          description: Agendamento não encontrado

  /bookings/{id}/cancel:
    put:
      tags:
        - Agendamentos
      summary: Cancelar agendamento
      operationId: cancelBooking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Agendamento cancelado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '401':
          description: Não autorizado
        '404':
          description: Agendamento não encontrado

  /bookings/{id}/complete:
    put:
      tags:
        - Agendamentos
      summary: Marcar como completo
      description: Marca agendamento como concluído
      operationId: completeBooking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Agendamento marcado como concluído
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '401':
          description: Não autorizado
        '404':
          description: Agendamento não encontrado
  /payments:
    post:
      tags:
        - Pagamentos
      summary: Processar pagamento
      description: Processa pagamento de um agendamento
      operationId: processPayment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: Pagamento processado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Dados de pagamento inválidos
        '401':
          description: Não autorizado
        '402':
          description: Pagamento recusado
        '404':
          description: Agendamento não encontrado

  /payments/{id}:
    get:
      tags:
        - Pagamentos
      summary: Obter status do pagamento
      operationId: getPaymentStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Status obtido com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '401':
          description: Não autorizado
        '404':
          description: Pagamento não encontrado

  /payments/{id}/refund:
    post:
      tags:
        - Pagamentos
      summary: Solicitar reembolso
      operationId: refundPayment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Reembolso processado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '401':
          description: Não autorizado
        '404':
          description: Pagamento não encontrado
  /reviews:
    get:
      tags:
        - Avaliações
      summary: Listar avaliações
      description: Lista avaliações com filtros opcionais
      operationId: listReviews
      parameters:
        - name: serviceId
          in: query
          schema:
            type: integer
            format: int64
        - name: providerId
          in: query
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Avaliações listadas com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'

    post:
      tags:
        - Avaliações
      summary: Criar avaliação
      description: Cria uma nova avaliação após agendamento concluído
      operationId: createReview
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Avaliação criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Dados inválidos
        '401':
          description: Não autorizado
        '404':
          description: Agendamento não encontrado ou já avaliado

  /reviews/{id}:
    put:
      tags:
        - Avaliações
      summary: Atualizar avaliação
      operationId: updateReview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReviewRequest'
      responses:
        '200':
          description: Avaliação atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '401':
          description: Não autorizado
        '403':
          description: Você não pode editar esta avaliação
        '404':
          description: Avaliação não encontrada

    delete:
      tags:
        - Avaliações
      summary: Deletar avaliação
      operationId: deleteReview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Avaliação deletada com sucesso
        '401':
          description: Não autorizado
        '404':
          description: Avaliação não encontrada
  /chat/{bookingId}:
    get:
      tags:
        - Chat
      summary: Obter histórico de mensagens
      description: Retorna histórico de chat para um agendamento
      operationId: getChatHistory
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 50
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Histórico obtido com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Não autorizado
        '404':
          description: Agendamento não encontrado

  /chat/{bookingId}/unread:
    get:
      tags:
        - Chat
      summary: Contar mensagens não lidas
      operationId: getUnreadCount
      parameters:
        - name: bookingId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Contagem obtida com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadCount:
                    type: integer

  /chat/{messageId}/read:
    put:
      tags:
        - Chat
      summary: Marcar mensagem como lida
      operationId: markMessageAsRead
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Mensagem marcada como lida
        '401':
          description: Não autorizado
        '404':
          description: Mensagem não encontrada
  /favorites:
    get:
      tags:
        - Favoritos
      summary: Listar serviços favoritos
      operationId: listFavorites
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Favoritos listados com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
        '401':
          description: Não autorizado

    post:
      tags:
        - Favoritos
      summary: Adicionar aos favoritos
      operationId: addToFavorites
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serviceId:
                  type: integer
                  format: int64
      responses:
        '201':
          description: Adicionado aos favoritos
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int64
        '401':
          description: Não autorizado
        '404':
          description: Serviço não encontrado

  /favorites/{serviceId}:
    delete:
      tags:
        - Favoritos
      summary: Remover dos favoritos
      operationId: removeFromFavorites
      parameters:
        - name: serviceId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Removido dos favoritos
        '401':
          description: Não autorizado
        '404':
          description: Serviço não favorito
  /notifications:
    get:
      tags:
        - Notificações
      summary: Listar notificações
      operationId: listNotifications
      security:
        - BearerAuth: []
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Notificações listadas com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedResponse'
        '401':
          description: Não autorizado

  /notifications/{id}/read:
    put:
      tags:
        - Notificações
      summary: Marcar notificação como lida
      operationId: markNotificationAsRead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Notificação marcada como lida
        '401':
          description: Não autorizado
        '404':
          description: Notificação não encontrada

  /notifications/{id}:
    delete:
      tags:
        - Notificações
      summary: Deletar notificação
      operationId: deleteNotification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Notificação deletada
        '401':
          description: Não autorizado
        '404':
          description: Notificação não encontrada
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Token obtido ao fazer login. 
        Incluir no header: `Authorization: Bearer {token}`

  schemas:
    # Autenticação
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
        - userType
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        firstName:
          type: string
          minLength: 2
        lastName:
          type: string
          minLength: 2
        userType:
          type: string
          enum: [CLIENT, SERVICE_PROVIDER, ADMIN]
        phone:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        type:
          type: string
          default: Bearer
        expiresIn:
          type: integer
          format: int64
        user:
          $ref: '#/components/schemas/UserResponse'

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
          format: int64

    # Usuários
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        profilePicture:
          type: string
        bio:
          type: string
        userType:
          type: string
        rating:
          type: number
          format: float
        totalReviews:
          type: integer
        city:
          type: string
        createdAt:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        bio:
          type: string
        city:
          type: string
        state:
          type: string

    # Serviços
    ServiceResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        category:
          type: string
        basePrice:
          type: number
          format: float
        estimatedDuration:
          type: integer
        serviceImage:
          type: string
        rating:
          type: number
          format: float
        totalReviews:
          type: integer
        provider:
          $ref: '#/components/schemas/UserResponse'

    ServiceDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ServiceResponse'
        - type: object
          properties:
            availabilities:
              type: array
              items:
                $ref: '#/components/schemas/AvailabilityResponse'

    CreateServiceRequest:
      type: object
      required:
        - title
        - description
        - category
        - basePrice
        - estimatedDuration
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 255
        description:
          type: string
          minLength: 20
        category:
          type: string
        basePrice:
          type: number
          format: float
          minimum: 0.01
        estimatedDuration:
          type: integer
          minimum: 15

    UpdateServiceRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        basePrice:
          type: number
          format: float
        estimatedDuration:
          type: integer

    AvailabilityResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        isAvailable:
          type: boolean

    AddAvailabilityRequest:
      type: object
      required:
        - dayOfWeek
        - startTime
        - endTime
      properties:
        dayOfWeek:
          type: integer
          minimum: 0
          maximum: 6
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time

    # Agendamentos
    BookingResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        serviceId:
          type: integer
          format: int64
        clientId:
          type: integer
          format: int64
        providerId:
          type: integer
          format: int64
        bookingDate:
          type: string
          format: date
        bookingTime:
          type: string
          format: time
        status:
          type: string
          enum: [PENDING, CONFIRMED, IN_PROGRESS, COMPLETED, CANCELLED]
        totalPrice:
          type: number
          format: float
        createdAt:
          type: string
          format: date-time

    BookingDetailResponse:
      allOf:
        - $ref: '#/components/schemas/BookingResponse'
        - type: object
          properties:
            service:
              $ref: '#/components/schemas/ServiceResponse'
            client:
              $ref: '#/components/schemas/UserResponse'
            provider:
              $ref: '#/components/schemas/UserResponse'

    CreateBookingRequest:
      type: object
      required:
        - serviceId
        - bookingDate
        - bookingTime
      properties:
        serviceId:
          type: integer
          format: int64
        bookingDate:
          type: string
          format: date
        bookingTime:
          type: string
          format: time
        notes:
          type: string

    UpdateBookingRequest:
      type: object
      properties:
        bookingDate:
          type: string
          format: date
        bookingTime:
          type: string
          format: time
        notes:
          type: string

    # Pagamentos
    PaymentRequest:
      type: object
      required:
        - bookingId
        - paymentMethod
      properties:
        bookingId:
          type: integer
          format: int64
        paymentMethod:
          type: string
          enum: [CREDIT_CARD, DEBIT_CARD, PIX, BANK_TRANSFER, WALLET]
        cardToken:
          type: string
          description: Stripe token (se usar CREDIT_CARD ou DEBIT_CARD)

    PaymentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bookingId:
          type: integer
          format: int64
        amount:
          type: number
          format: float
        paymentMethod:
          type: string
        status:
          type: string
          enum: [PENDING, PROCESSING, APPROVED, DECLINED, REFUNDED]
        transactionId:
          type: string
        paymentDate:
          type: string
          format: date-time

    # Avaliações
    ReviewResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bookingId:
          type: integer
          format: int64
        serviceId:
          type: integer
          format: int64
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      required:
        - bookingId
        - rating
      properties:
        bookingId:
          type: integer
          format: int64
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    UpdateReviewRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string

    # Chat
    MessageResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        senderId:
          type: integer
          format: int64
        recipientId:
          type: integer
          format: int64
        message:
          type: string
        messageType:
          type: string
          enum: [TEXT, IMAGE, FILE, SYSTEM]
        fileUrl:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # Paginação
    PagedResponse:
      type: object
      properties:
        content:
          type: array
          items:
            type: object
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
        empty:
          type: boolean

    # Erro
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string